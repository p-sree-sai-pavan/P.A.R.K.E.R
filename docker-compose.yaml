services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5442:5432"
    volumes:
      - parker_pgdata:/var/lib/postgresql/data   # ← add this

volumes:
  parker_pgdata:                                  # ← add this